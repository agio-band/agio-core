name: agio_core
label: agio Core
description: |
  Main core package for agio pipeline
icon: 'core/agio-logo.png'
tags:
urls:
  source_url: "https://github.com/agio-band/agio-core.git"
  home_page: "https://github.com/agio-band/agio-core.git"
  documentation: "https://github.com/agio-band/agio-core/blob/master/docs/index.md"
  bug_tracker: "https://github.com/agio-band/agio-core/issues"

#resources_dir: "custom/resources" # default "/resources"
required_packages: []

plugins:
  # services
  - label: Core Service
    implementations:
      - module: plugins/services/core_service.py

  - label: Actions Service
    implementations:
      - module: plugins/services/actions_service.py

  - label: Apps Service
    implementations:
      - module: plugins/services/apps_service.py

  # commands
  - label: Info Command
    implementations:
      - module: plugins/commands/info_cmd.py

  - label: Workspace Command
    implementations:
      - module: plugins/commands/workspace_cmd.py

  - label: Run Command
    implementations:
      - module: plugins/commands/run_cmd.py

  - label: Run Action Command
    implementations:
      - module: plugins/commands/action_cmd.py

  - label: Apps Command
    implementations:
      - module: plugins/commands/apps_cmd.py

  - label: Launch Command
    implementations:
      - module: plugins/commands/launch_cmd.py

  - label: Manage agio packages command
    implementations:
      - module: plugins/commands/package_cmd.py

  - label: Settings command
    implementations:
      - module: plugins/commands/settings_cmd.py

  - label: Manage revisions
    implementations:
      - module: plugins/commands/revision_cmd.py

  - label: Debug Shell
    implementations:
        - module: plugins/commands/shell_command.py
          app_groups:
            - standalone

  # parameter dependencies
  - label: Expression Dependency
    implementations:
      - module: plugins/dependency_solvers/expression.py

  # auth
  - label: Auth command
    implementations:
      - module: plugins/commands/auth_cmd.py

  # release repository
  - label: GitHub release repository
    implementations:
      - module: plugins/release_repository/github_release_repository.py

  - label: GitLab Release repository
    implementations:
      - module: plugins/release_repository/gitlab_release_repository.py

  - label: Gitea Release repository
    implementations:
      - module: plugins/release_repository/gitea_release_repository.py

# apps

  - label: Main standalone application api
    implementations:
      - module: plugins/application_api/standalone_main.py
        app_groups:
          - standalone



settings:
  local:
    layout: package_settings/local_layout.yml
    model: package_settings.local_settings.CoreSettings

callbacks:
  - plugins/callbacks/launcher_processing.py

package_callbacks:
  - plugins/callbacks/package_callbacks.py

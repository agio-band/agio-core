query GetWorkspaceSettingsList(
    $revisionId: ID!,
    $first: Int!,
    $afterCursor: String,
){
    workspaceSettingses(
        first: $first
        after: $afterCursor
        ordering: [
          {
            sort: CREATED_AT,
            direction: DESC
          }
        ]
        filter: {
          where: {
            workspaceRevision: {
              id: { equalTo: $revisionId }
            }
          }
        }
    ){
        edges {
            node {
                id
                workspaceRevisionId
                isCurrent
                comment
                createdAt
            }
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
          startCursor
          endCursor
        }
    }
}
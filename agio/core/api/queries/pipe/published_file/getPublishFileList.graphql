query GetPublishFileList($first: Int!, $filter: PublishFileFilter, $afterCursor: String) {
    publishFiles(
        first: $first,
        filter: $filter
        after: $afterCursor
    ) {
        edges {
            node {
                id
                name
                path
              	publishVersionId
                createdAt
            }
        }
        pageInfo {
            hasNextPage
            hasPreviousPage
            startCursor
            endCursor
        }
    }
}

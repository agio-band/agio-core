query GetProductList($first: Int!, $filter: PublishFilter, $afterCursor: String) {
    publishes(
        first: $first,
        filter: $filter,
        after: $afterCursor
        ordering: {sort: CREATED_AT}
    ) {
        edges {
            node {
                id
                name
                type {
                    id
                    name
                }
                fields
                variant
                entityId
                createdAt
            }
        }
        pageInfo {
            hasNextPage
            hasPreviousPage
            startCursor
            endCursor
        }
    }
}

query GetPublishSessionList($filter: PublishSessionFilter, $first: Int = 100, $afterCursor: String){
  publishSessions(
    first: $first,
    filter: $filter,
    after: $afterCursor
  ){
    edges{
      node{
        id
        name
        number
        state
        status
        data
        entity {
          id
          name
        }
        publishVersions {
          id
          name
          publishId
        }
      }
    }
    pageInfo {
            hasNextPage
            hasPreviousPage
            startCursor
            endCursor
        }
  }
}
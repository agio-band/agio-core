query GetLatestPublishSessionForEntity($entityId: ID!) {
  publishSessions(
    first: 1,
    filter: { where: {
      entityId: { equalTo: $entityId },
    } },
    ordering: { direction: DESC, sort: NUMBER }
  ) {
    edges {
      node {
        id
        name
        number
        status
      }
    }
  }
}

query getCompanyList($first: Int!, $userId: ID!, $afterCursor: String) {
  companies(
      first: $first,
      after: $afterCursor,
	  filter: {
        where: {
          members: {
            id: {
              equalTo: $userId
            }
          }
          or: {
            hostUser: {
              id: {
                equalTo: $userId
              }
            }
          }
        }
      }
  )
  {
    edges{
      node{
        id
        name
        code
        hostUser{
          name
          id
        }
      }
    }
    pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
    }
  }
}
query GetEntityById($id: ID!) {
  entities(
      filter: {
        where: { id: { equalTo: $id } }
      },
      first: 1
  ) {
    edges {
      node {
        id
        name
        projectId
        project {
          name
          code
          workspaceId
        }
        fields
        class {
          name
          id
        }
        links {
          toId
          roleId
        }
        parent {
          name
          id
          parentId
          fields
          class {
            name
            id
          }
        }
      }
    }
  }
}
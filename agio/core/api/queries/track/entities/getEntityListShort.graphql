query GetEntityList($where: EntityWhere, $first: Int!, $afterCursor: String) {
    entities (
        filter: {
            where: $where
        },
        first: $first
        after: $afterCursor
    ){
        edges {
            node{
                id
                name
                class{
                    name
                }
                fields
                parentId
            }
        }

     pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
    }
    }
}
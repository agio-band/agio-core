query GetEntityList($where: EntityWhere, $first: Int!, $afterCursor: String) {
    entities (
        filter: {
            where: $where
        },
        first: $first
        after: $afterCursor
    ){
        edges {
            node{
                id
                name
                projectId
                project {
                    name
                    code
                    workspaceId
                    companyId
                }
                class{
                    name
                }
                fields
                links{
                    toId
                    roleId
                }
                parentId
                parent{
                    name
                    id
                    parentId
                }
            }
        }

     pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
    }
    }
}
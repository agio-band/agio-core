query GetEntityList($where: EntityWhere, $first: Int!) {
    entities (
        filter: {
            where: $where
        },
        first: $first
    ){
        edges {
            node{
                id
                name
                projectId
                project {
                    name
                    code
                    workspaceId
                }
                class{
                    name
                }
                fields
                links{
                    toId
                    roleId
                }

                parent{
                    name
                    id
                    parentId
                }
            }
        }
    }
}